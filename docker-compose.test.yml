# =============================================================================
#  THROWAWAY integration-test stack. NOT for normal use.
#  Verifies the SCF schema + mu-plugins produce the REST shape the frontend
#  expects. Uses its own ports (18080) and an EPHEMERAL database (tmpfs, wiped
#  on teardown) so it never touches dev/stg/prod data or the running prod stack.
#
#  Run:  docker compose -f docker-compose.test.yml up -d
#  Tear: docker compose -f docker-compose.test.yml down -v
# =============================================================================

services:
  wp-test:
    image: wordpress:php8.3-apache
    container_name: yuva-wp-test
    ports:
      - "18080:80"
    environment:
      WORDPRESS_DB_HOST: db-test:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wp
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG', true );
    volumes:
      - wp_core:/var/www/html                      # full WP root (shared with cli)
      - ./wordpress/wp-content:/var/www/html/wp-content
    depends_on:
      db-test:
        condition: service_healthy

  db-test:
    image: mysql:8
    container_name: yuva-db-test
    environment:
      MYSQL_DATABASE: wp
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
      MYSQL_ROOT_PASSWORD: root
    tmpfs:
      - /var/lib/mysql        # ephemeral DB — wiped when the container stops
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  wpcli-test:
    image: wordpress:cli-php8.3
    container_name: yuva-wpcli-test
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db-test:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wp
    volumes:
      - wp_core:/var/www/html                      # same WP root as wp-test
      - ./wordpress/wp-content:/var/www/html/wp-content
    depends_on:
      - wp-test
    entrypoint: ["sleep", "infinity"]

volumes:
  wp_core:
